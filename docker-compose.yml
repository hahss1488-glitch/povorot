services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: povorot
      POSTGRES_USER: povorot
      POSTGRES_PASSWORD: povorot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    command: python -m app.main

volumes:
  pg_data:
